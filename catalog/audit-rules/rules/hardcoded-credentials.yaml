id: hardcoded-credentials
description: API key, secret, or password in source code.
anti_pattern:
  type: regex
  pattern: (api[_-]?key|secret|password|token)\s*[:=]\s*['\"][^'\"]+['\"]
  path_glob: "**/*.{ts,js,php,env}"
fix_suggestion: Use environment variables or a secret store (e.g. Key module, process.env, vault).
severity: error
dimension: security
target_languages: [typescript, javascript, php]
tags: [credentials, security, vibecoding]
