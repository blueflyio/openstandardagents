id: drupal-hardcoded-credentials
description: "Potential hardcoded password or API key in source code."
severity: error
dimension: security
anti_pattern:
  type: regex
  pattern: "(password|api_key|apikey|secret|token)\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
  flags: gim
  path_glob: "**/*.{php,module,inc,install}"
fix_suggestion: "Use getenv() or Drupal Key module for credentials"
target_languages: [php]
tags: [drupal, security, credentials]
