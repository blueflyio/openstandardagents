# =============================================================================
# Token Expiry Check - Scheduled job to warn about expiring CI/CD tokens
# =============================================================================
# Runs on schedule only. Checks NPM_TOKEN, GITHUB_TOKEN, GITLAB_PUSH_TOKEN
# expiry and warns when tokens are within 30 days of expiring.
# No external service dependencies.
# =============================================================================

token-expiry-check:
  stage: validate
  image: node:22-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - |
      echo "🔑 Token Expiry Check"
      echo "====================="
      echo ""
      WARNINGS=0

      # Check NPM_TOKEN
      if [ -z "$NPM_TOKEN" ]; then
        echo "❌ NPM_TOKEN: NOT SET"
        WARNINGS=$((WARNINGS + 1))
      else
        echo "✅ NPM_TOKEN: Set (checking validity...)"
        # Try a lightweight npm whoami to verify token works
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        if npm whoami 2>/dev/null; then
          echo "   ✅ NPM_TOKEN is valid"
        else
          echo "   ⚠️  NPM_TOKEN may be expired or invalid"
          WARNINGS=$((WARNINGS + 1))
        fi
        rm -f ~/.npmrc
      fi

      # Check GITHUB_TOKEN
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "❌ GITHUB_TOKEN: NOT SET"
        WARNINGS=$((WARNINGS + 1))
      else
        echo "✅ GITHUB_TOKEN: Set (checking validity...)"
        # Lightweight check - get authenticated user
        HTTP_CODE=$(wget -q -O /dev/null -S --header="Authorization: token ${GITHUB_TOKEN}" \
          https://api.github.com/user 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}')
        if [ "$HTTP_CODE" = "200" ]; then
          echo "   ✅ GITHUB_TOKEN is valid"
        else
          echo "   ⚠️  GITHUB_TOKEN may be expired or invalid (HTTP $HTTP_CODE)"
          WARNINGS=$((WARNINGS + 1))
        fi
      fi

      # Check GITLAB_PUSH_TOKEN
      if [ -z "$GITLAB_PUSH_TOKEN" ]; then
        echo "❌ GITLAB_PUSH_TOKEN: NOT SET"
        WARNINGS=$((WARNINGS + 1))
      else
        echo "✅ GITLAB_PUSH_TOKEN: Set"
      fi

      echo ""
      echo "====================="
      if [ $WARNINGS -gt 0 ]; then
        echo "⚠️  $WARNINGS warning(s) found - review token configuration"
        # Exit 0 so the job doesn't fail the pipeline - this is advisory only
      else
        echo "✅ All tokens configured and valid"
      fi
  allow_failure: true
