# =============================================================================
# GITHUB MIRROR + AUTO-RELEASES
# =============================================================================
# One-way mirror: GitLab → GitHub (read-only on GitHub side)
#
# Syncs:
#   Branches: main, release/v*.*.x
#   Tags:     v1.2.3 (stable) and v1.2.3-rc.N (release candidates)
#   Releases: Auto-created on GitHub for every synced tag
#
# Requirements:
#   GITHUB_TOKEN - Fine-grained PAT with Contents:write on
#                  github.com/blueflyio/openstandardagents
# =============================================================================

sync:github:
  stage: sync
  image: alpine/git:latest
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache bash curl jq
    - git config user.name "OSSA Release Bot"
    - git config user.email "release-bot@openstandardagents.org"
  script:
    - |
      #!/bin/bash
      set -euo pipefail

      GITHUB_REPO="blueflyio/openstandardagents"

      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "⚠️  GITHUB_TOKEN not set — skipping GitHub sync"
        echo "   Set it at: Settings > CI/CD > Variables"
        exit 0
      fi

      GITHUB_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"

      echo "═══════════════════════════════════════════"
      echo "  GITHUB MIRROR SYNC"
      echo "═══════════════════════════════════════════"
      echo "  Branch: ${CI_COMMIT_BRANCH:-N/A}"
      echo "  Tag:    ${CI_COMMIT_TAG:-N/A}"
      echo "  Commit: ${CI_COMMIT_SHA:0:8}"
      echo ""

      # ── SYNC BRANCHES ──────────────────────────────────
      echo "── Branches ──"
      SYNCED=0 SKIPPED=0

      while IFS= read -r ref; do
        branch="${ref#origin/}"

        # Only sync: main, release/v*.*.x
        if [[ "$branch" == "main" ]] || [[ "$branch" =~ ^release/v[0-9]+\.[0-9]+\.x$ ]]; then
          echo "  ✓ $branch"
          git push "$GITHUB_URL" "origin/${branch}:refs/heads/${branch}" --force 2>&1 || \
            echo "  ⚠ Failed: $branch (non-fatal)"
          ((SYNCED++)) || true
        else
          ((SKIPPED++)) || true
        fi
      done < <(git branch -r | grep -v HEAD | sed 's/^[[:space:]]*//')

      echo "  Synced: $SYNCED  Skipped: $SKIPPED"
      echo ""

      # ── SYNC TAGS ──────────────────────────────────────
      echo "── Tags ──"
      SYNCED=0 SKIPPED=0
      TAGS_PUSHED=()

      while IFS= read -r tag; do
        [ -z "$tag" ] && continue

        # Stable: v1.2.3
        # RC:     v1.2.3-rc.N
        if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
           [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
          echo "  ✓ $tag"
          git push "$GITHUB_URL" "refs/tags/${tag}:refs/tags/${tag}" --force 2>&1 || \
            echo "  ⚠ Failed: $tag (non-fatal)"
          TAGS_PUSHED+=("$tag")
          ((SYNCED++)) || true
        else
          ((SKIPPED++)) || true
        fi
      done < <(git tag 2>/dev/null)

      echo "  Synced: $SYNCED  Skipped: $SKIPPED"
      echo ""

      # ── AUTO-CREATE GITHUB RELEASES ────────────────────
      # Only create a release for the tag that triggered this pipeline
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        TAG="${CI_COMMIT_TAG}"

        # Verify it's a tag we care about
        if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
           [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then

          IS_PRERELEASE=false
          [[ "$TAG" == *"-rc."* ]] && IS_PRERELEASE=true

          echo "── GitHub Release ──"
          echo "  Tag: $TAG  Prerelease: $IS_PRERELEASE"

          # Check if release already exists
          EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${TAG}")

          if [ "$EXISTING" = "200" ]; then
            echo "  ⏭ Release already exists — skipping"
          else
            # Create release
            RELEASE_BODY="## OSSA ${TAG}\n\nPublished from [GitLab](https://gitlab.com/blueflyio/ossa/openstandardagents/-/releases/${TAG}).\n\n### Install\n\`\`\`bash\nnpm install @bluefly/openstandardagents@${TAG#v}\n\`\`\`\n\n### Links\n- [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${TAG#v})\n- [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)"

            HTTP_CODE=$(curl -s -o /tmp/gh-release.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPO}/releases" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"name\": \"Release ${TAG}\",
                \"body\": \"${RELEASE_BODY}\",
                \"prerelease\": ${IS_PRERELEASE},
                \"generate_release_notes\": false
              }")

            if [ "$HTTP_CODE" = "201" ]; then
              RELEASE_URL=$(jq -r '.html_url' /tmp/gh-release.json)
              echo "  ✓ Created: $RELEASE_URL"
            else
              echo "  ⚠ Failed (HTTP $HTTP_CODE):"
              jq -r '.message // .errors[0].message // "unknown error"' /tmp/gh-release.json 2>/dev/null || true
            fi
          fi
        fi
      fi

      echo ""
      echo "✅ GitHub sync complete"
  rules:
    # On main branch pushes
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    # On release branch pushes
    - if: $CI_COMMIT_BRANCH =~ /^release\/v[0-9]+\.[0-9]+\.x$/
      when: on_success
    # On stable tag creation (v1.2.3)
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
    # On RC tag creation (v1.2.3-rc.N)
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$/
      when: on_success
    # Scheduled catch-up sync
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
  allow_failure: true
