# GitLab Duo External Agent: OSSA Code Reviewer
# https://docs.gitlab.com/user/duo_agent_platform/agents/external/
#
# Reviews code changes against OSSA spec and project standards.
# Uses Claude via GitLab-managed credentials (injectGatewayToken).
#
# Setup:
#   1. Settings > GitLab Duo > Enable "OSSA Code Reviewer"
#   2. Add trigger: Assign reviewer (service account)
#   3. Config path: .gitlab/duo/flows/ossa-code-reviewer.yaml
#
# Service account naming: ai-ossa-code-reviewer-<group>

injectGatewayToken: true
image: node:22-slim

commands:
  - npm install -g @bluefly/openstandardagents
  - apt-get update --quiet && apt-get install --yes curl git && rm -rf /var/lib/apt/lists/*
  - curl -sL "https://raw.githubusercontent.com/upciti/wakemeops/main/assets/install_repository" | bash
  - apt-get install -y glab
  - mkdir -p ~/.config/glab-cli
  - |
    cat > ~/.config/glab-cli/config.yml <<EOF
    hosts:
      $AI_FLOW_GITLAB_HOSTNAME:
        token: $AI_FLOW_GITLAB_TOKEN
        is_oauth2: "true"
        client_id: "bypass"
        oauth2_refresh_token: ""
        oauth2_expiry_date: "01 Jan 50 00:00 UTC"
        api_host: $AI_FLOW_GITLAB_HOSTNAME
        user: OSSACodeReviewer
    check_update: "false"
    git_protocol: https
    EOF
  - chmod 600 ~/.config/glab-cli/config.yml
  - git config --global user.email "ossa-reviewer@gitlab.com"
  - git config --global user.name "OSSA Code Reviewer"
  - git remote set-url origin https://gitlab-ci-token:$AI_FLOW_GITLAB_TOKEN@$AI_FLOW_GITLAB_HOSTNAME/$AI_FLOW_PROJECT_PATH.git
  - export ANTHROPIC_AUTH_TOKEN=$AI_FLOW_AI_GATEWAY_TOKEN
  - export ANTHROPIC_CUSTOM_HEADERS=$AI_FLOW_AI_GATEWAY_HEADERS
  - export ANTHROPIC_BASE_URL="https://cloud.gitlab.com/ai/v1/proxy/anthropic"
  - |
    claude --allowedTools="Bash(glab:*),Bash(git:*),Bash(npx:*)" --permission-mode acceptEdits --verbose --output-format stream-json -p "
    You are the OSSA Code Reviewer for the openstandardagents project.

    Context: $AI_FLOW_CONTEXT
    Task: $AI_FLOW_INPUT
    Event: $AI_FLOW_EVENT

    Review the code changes in this merge request:
    1. Check TypeScript strict mode compliance
    2. Validate OSSA manifest changes against spec/v0.3/
    3. Check adapter pattern compliance (BaseAdapter, registry)
    4. Verify DI container bindings (Inversify)
    5. Check for separation of duties violations
    6. Ensure tests exist for new code
    7. Validate OpenAPI spec changes

    Post your review as inline MR comments using glab.
    Use 'glab mr diff' to see the changes.
    Use 'glab mr note' to post comments.

    Be thorough but concise. Focus on correctness, not style.
    "
