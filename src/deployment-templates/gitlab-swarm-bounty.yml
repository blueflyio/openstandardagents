# BlueFly Synaptic Mesh - Swarm Execution Node
# This template is injected into all Agent repositories.
# It responds to "Bounties" (Issues) or Merge Requests from other Agents.
# It spins up an ephemeral OpenAI Swarm routed via LiteLLM to perform the task.

stages:
  - negotiate
  - execute-swarm
  - evaluate
  - finalize

variables:
  # LiteLLM Gateway for unified routing
  LITELLM_ENDPOINT: "https://llm.blueflyagents.com/v1"
  # Target the agent's spatial vector memory in Drupal
  DRUPAL_CANVAS_MEMORY_URL: "https://canvas.blueflyagents.com/api/vdb"
  # Force Swarms to serialize observations via OSSA v0.5 protocol
  OSSA_SERIALIZATION_PROFILE: "compact"

.agent_execution_matrix:
  image: python:3.11-slim
  before_script:
    - pip install -q openai swarm litellm deepeval langfuse ossa-sdk
    - export OPENAI_API_BASE=$LITELLM_ENDPOINT
    - export OPENAI_API_KEY=$LITELLM_API_KEY  # Provided by GitLab vault

negotiation_phase:
  stage: negotiate
  script:
    - echo "Validating Issue/Bounty contract from calling Agent..."
    - >
      python -c "
      import os, sys
      from ossa import validate_mesh_binding
      # Validate the incoming A2A bounty payload against our constraints
      is_valid = validate_mesh_binding(os.environ.get('CI_MERGE_REQUEST_IID', '1'))
      if not is_valid: sys.exit(1)
      "
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "api" # When triggered by Drupal

swarm_execution:
  stage: execute-swarm
  extends: .agent_execution_matrix
  script:
    - echo "Spinning up local Swarm to fulfill bounty..."
    - |
      cat << 'EOF' > swarm_runtime.py
      import sys
      from swarm import Swarm, Agent
      from litellm import completion

      # Connect to LiteLLM
      client = Swarm()

      # The Swarm logic reads from Qdrant via Drupal and executes
      def fetch_canvas_memory():
          print("Pulling vector memory from spatial canvas node...")
          return "Memory context..."

      worker = Agent(
          name="WorkerNode",
          instructions="You are an execution node in the BlueFly Synaptic Mesh. You complete bounties by writing code.",
          functions=[fetch_canvas_memory]
      )

      # Trigger execution based on MR or Webhook issue
      # results = client.run(agent=worker, messages=[{"role":"user", "content": "Execute bounty."}])
      print("Swarm execution completed.")
      EOF
    - python swarm_runtime.py
  artifacts:
    paths:
      - swarm_execution_trace.json

darwinian_evaluation:
  stage: evaluate
  extends: .agent_execution_matrix
  script:
    - echo "GitLab Duo acting as Chief Justice..."
    - |
      echo "Running DeepEval against the swarm_execution_trace.json"
      # deepeval test run test_swarm_output.py
  allow_failure: false # If the agent hallucinates, fail the pipeline so it dies.
  dependencies:
    - swarm_execution

evolve_model_registry:
  stage: finalize
  script:
    - echo "Swarm succeeded. Pushing successful trace to Langfuse and extracting LoRA weights."
    - echo "Registering new capability to GitLab Model Registry for future agents to inherit."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
