# Lefthook Configuration (Single Source of Truth)
# Uses TypeScript validators instead of shell scripts (SOLID, DRY, Zod)

assert_lefthook_installed: true
no_tty: false
colors: true

pre-commit:
  parallel: true
  commands:
    typecheck:
      run: npx tsc --noEmit
      stage_fixed: false

    no-secrets:
      run: |
        if git diff --cached --name-only | grep -qE '\.(env|key|pem|p12|pfx|secret)$'; then
          echo "Secrets detected in staged files. Remove before committing."
          git diff --cached --name-only | grep -E '\.(env|key|pem|p12|pfx|secret)$'
          exit 1
        fi

    no-shell-scripts:
      glob: "*.sh"
      run: |
        echo "❌ Shell scripts (.sh) are NOT allowed. Use TypeScript."
        exit 1

    validate-gitlab-ci:
      run: tsx src/tools/validation/gitlab-ci-validator.ts .gitlab-ci.yml
      glob: ".gitlab-ci.yml"
      stage_fixed: true

    prevent-hardcoded-versions:
      run: tsx src/tools/validation/version-validator.ts
      stage_fixed: false

pre-push:
  parallel: false
  commands:
    ensure-deps:
      priority: 0
      run: |
        if [ ! -f node_modules/.bin/tsx ]; then
          echo "Dependencies missing (no node_modules/.bin/tsx). Running npm install..."
          npm install
        fi
      skip:
        - merge
        - rebase

    rebase-sync:
      priority: 1
      run: |
        BRANCH=$(git branch --show-current)
        if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
          if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
            echo "Syncing with origin/$BRANCH before push..."
            git pull --rebase origin "$BRANCH" || {
              echo "Rebase failed. Resolve conflicts, then push again."
              exit 1
            }
          fi
        fi
      skip:
        - merge
        - rebase

    branch-protection:
      priority: 2
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ] || [ "$branch" = "development" ]; then
          echo "Direct push to $branch is blocked. Use a feature branch + MR."
          exit 1
        fi

    validate-all:
      run: npm run validate

    validate-deps:
      run: npm run validate:deps
