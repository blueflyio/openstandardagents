pre-commit:
  parallel: true
  commands:
    typecheck:
      run: npx tsc --noEmit
      stage_fixed: false

    validate-schema:
      glob: "*.ossa.{yaml,yml}"
      run: npm run validate:schema

    no-shell-scripts:
      glob: "*.sh"
      run: |
        echo "❌ Shell scripts (.sh) are NOT allowed. Use TypeScript."
        exit 1

pre-push:
  parallel: false
  commands:
    test-unit:
      run: npm run test:unit

    prepublish-check:
      run: npm run prepublishOnly

    validate-all:
      run: npm run validate

    validate-deps:
      run: npm run validate:deps

    validate-sdks:
      run: npm run validate:sdks

    test-smoke:
      run: npm run test:smoke
