pre-commit:
  parallel: false
  commands:
    prepublish-checks:
      run: npm run prepublishOnly

    validate-schema:
      glob: "*.ossa.{yaml,yml}"
      run: npm run validate:schema

    typecheck:
      run: npm run typecheck

    no-shell-scripts:
      glob: "*.sh"
      run: |
        echo "❌ ERROR: Shell scripts (.sh files) are NOT allowed in this project."
        echo ""
        echo "Rules:"
        echo "  - Use npm scripts in package.json"
        echo "  - Use TypeScript tools in src/cli/ or src/tools/"
        echo "  - Use GitLab CI Components"
        echo "  - Use JavaScript/TypeScript git hooks in .husky/"
        echo ""
        echo "Blocked files:"
        git diff --cached --name-only --diff-filter=ACM | grep '\.sh$'
        echo ""
        exit 1

pre-push:
  parallel: false
  commands:
    build:
      run: npm run build

    test-unit:
      run: npm run test:unit

    validate-sdks:
      run: npm run validate:sdks

    validate-all:
      run: npm run validate

    test-smoke:
      run: npm run test:smoke
