apiVersion: ossa/v0.4
kind: Agent
metadata:
  name: code-assistant
  version: 1.0.0
  description: A single code assistant agent
  agentType: claude
  agentKind: assistant
  agentArchitecture:
    pattern: single
    capabilities:
      - tools
      - code
      - context
spec:
  role: >
    You are an expert code assistant. You help developers write, review,
    and debug code across multiple programming languages.
  llm:
    provider: anthropic
    model: claude-sonnet-4-5-20250514
    temperature: 0.3
    maxTokens: 8192
  tools:
    - type: function
      name: read_file
      description: Read a file from the filesystem
    - type: function
      name: write_file
      description: Write content to a file
    - type: function
      name: run_tests
      description: Execute test suite
  constraints:
    cost:
      maxTokensPerRequest: 8192
      maxTokensPerDay: 500000
    performance:
      maxLatencySeconds: 30
      timeoutSeconds: 120
