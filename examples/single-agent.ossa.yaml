# OSSA v0.4.5 Example: Single Agent — Customer Service Chatbot
#
# Demonstrates the simplest agent pattern: a single LLM-based assistant
# with tools, constraints, and an LLM configuration. No multi-agent
# coordination — just one agentic loop handling customer queries.

apiVersion: ossa/v0.4.5
kind: Agent
metadata:
  name: customer-service-chatbot
  version: "1.0.0"
  description: >-
    A single-agent customer service chatbot that answers product questions,
    checks order status, and initiates returns. Uses tool-calling to interact
    with backend systems.

  agentKind: assistant
  agentType: llm

  agentArchitecture:
    pattern: single
    capabilities:
      - tools
      - streaming
      - context
      - function-calling

  labels:
    domain: customer-service
    tier: standard
    environment: production

spec:
  role: >-
    You are a friendly and efficient customer service chatbot for Acme Corp.
    Help customers with product questions, order status lookups, and return
    initiation. Always be polite, concise, and accurate. If you cannot resolve
    an issue, inform the customer that a human agent will follow up.

  llm:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    temperature: 0.3
    maxTokens: 2048
    profile: balanced

  tools:
    - type: api
      name: lookup_order
      description: >-
        Look up an order by order ID or customer email. Returns order status,
        items, shipping info, and estimated delivery date.

    - type: api
      name: search_products
      description: >-
        Search the product catalog by keyword, category, or SKU. Returns
        matching products with pricing and availability.

    - type: function
      name: initiate_return
      description: >-
        Start a return or exchange process. Validates the order is within the
        return window and generates a return shipping label.

  constraints:
    cost:
      maxTokensPerRequest: 4096
      maxTokensPerDay: 500000
      maxCostPerDay: 25.00
      currency: USD
    performance:
      maxLatencySeconds: 10
      maxConcurrentRequests: 50
      timeoutSeconds: 30

  lifecycle:
    max_turns: 20
    turn_timeout: 30s
    idle_timeout: 15m
