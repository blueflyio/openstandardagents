apiVersion: ossa/v0.3.3
kind: Agent
metadata:
  name: cursor-coding-assistant
  version: 1.0.0
  description: AI coding assistant for Cursor IDE with advanced code generation and refactoring
  author: Bluefly Platform
  tags:
    - cursor
    - coding-assistant
    - ai
    - ide
    - code-generation
  license: MIT

spec:
  role: |
    You are an expert coding assistant that helps developers write clean, efficient,
    and maintainable code. You specialize in:
    - Generating high-quality code from natural language descriptions
    - Refactoring existing code for better quality and performance
    - Providing best practices guidance and code reviews
    - Writing comprehensive tests for code
    - Creating clear documentation

    Always prioritize code quality, readability, and maintainability. Follow
    language-specific conventions and best practices.

  capabilities:
    - code-generation
    - code-review
    - refactoring
    - testing
    - documentation

  tools:
    - type: function
      name: generate_code
      description: Generate code based on natural language description
      inputSchema:
        type: object
        properties:
          description:
            type: string
            description: Natural language description of desired functionality
          language:
            type: string
            enum: [typescript, javascript, python, go, rust, java]
            description: Target programming language
          framework:
            type: string
            description: Framework to use (optional)
          style:
            type: string
            enum: [functional, object-oriented, procedural]
            description: Programming style preference
            default: functional
          include_tests:
            type: boolean
            description: Whether to include unit tests
            default: true
        required:
          - description
          - language

    - type: function
      name: refactor_code
      description: Refactor existing code for better quality
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: Code to refactor
          goals:
            type: array
            items:
              type: string
              enum: [readability, performance, maintainability, testability]
            description: Refactoring goals
            default: [readability, maintainability]
          preserve_behavior:
            type: boolean
            description: Ensure behavior is preserved
            default: true
        required:
          - code

    - type: function
      name: generate_tests
      description: Generate comprehensive tests for code
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: Code to generate tests for
          test_framework:
            type: string
            description: Test framework to use (e.g., jest, pytest, go test)
          coverage_target:
            type: number
            description: Target code coverage percentage
            default: 80
          include_edge_cases:
            type: boolean
            description: Include edge case tests
            default: true
        required:
          - code

    - type: function
      name: document_code
      description: Generate documentation for code
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: Code to document
          style:
            type: string
            enum: [jsdoc, docstring, rustdoc, javadoc]
            description: Documentation style
          include_examples:
            type: boolean
            description: Include usage examples
            default: true
        required:
          - code

    - type: function
      name: code_review
      description: Perform automated code review
      inputSchema:
        type: object
        properties:
          code:
            type: string
            description: Code to review
          checks:
            type: array
            items:
              type: string
              enum:
                - style
                - security
                - performance
                - complexity
                - best-practices
            description: Types of checks to perform
            default: [style, security, complexity]
          severity_threshold:
            type: string
            enum: [info, warning, error, critical]
            description: Minimum severity to report
            default: warning
        required:
          - code

  llm:
    provider: anthropic
    model: claude-opus-4
    max_tokens: 8000
    temperature: 0.3

  access:
    tier: tier_1_read
    scopes:
      - read_api
      - read_repository

  deployment:
    runtime: ide
    platform: cursor
