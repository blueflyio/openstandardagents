content_moderator.settings:
  path: '/admin/config/ossa/content_moderator'
  defaults:
    _form: '\Drupal\content_moderator\Form\AgentConfigForm'
    _title: 'content_moderator settings'
  requirements:
    _permission: 'administer content_moderator'

content_moderator.execute:
  path: '/admin/ossa/content_moderator/execute'
  defaults:
    _form: '\Drupal\content_moderator\Form\AgentExecuteForm'
    _title: 'Execute content_moderator agent'
  requirements:
    _permission: 'execute content_moderator'

content_moderator.dashboard:
  path: '/admin/ossa/content_moderator/dashboard'
  defaults:
    _controller: '\Drupal\content_moderator\Controller\AgentController::dashboard'
    _title: 'content_moderator dashboard'
  requirements:
    _permission: 'view content_moderator executions'

content_moderator.execution.view:
  path: '/admin/ossa/content_moderator/execution/{content_moderator_execution}'
  defaults:
    _controller: '\Drupal\content_moderator\Controller\AgentController::viewExecution'
    _title: 'View execution'
  requirements:
    _permission: 'view content_moderator executions'
