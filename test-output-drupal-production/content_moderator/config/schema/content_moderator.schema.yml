content_moderator.settings:
  type: config_object
  label: 'content_moderator settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable agent'
    async_execution:
      type: boolean
      label: 'Enable async execution'
    timeout:
      type: integer
      label: 'Execution timeout'
    retry_attempts:
      type: integer
      label: 'Retry attempts'
