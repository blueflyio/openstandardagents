name = "duadp-node"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_NAME = "Bluefly Agent Platform"
NODE_DESCRIPTION = "OSSA-compliant UADP node for Bluefly Agent Platform"
NODE_CONTACT = "admin@blueflyagents.com"
BOOTSTRAP_URL = "https://registry.openstandardagents.org"

[[d1_databases]]
binding = "DB"
database_name = "duadp-store"
database_id = "3688ba9f-70db-4c29-ab6d-be78c15b968c"

[[kv_namespaces]]
binding = "PEERS_KV"
id = "77def2ac43b74cb98972fb15b1616f85"

# Custom domain (optional)
# [routes]
# route = "uadp.blueflyagents.com/*"
# zone_name = "blueflyagents.com"
