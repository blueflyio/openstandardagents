# =============================================================================
# OSSA Specification CI/CD Pipeline (GitLab Ultimate)
# =============================================================================
#
# Source of truth: GitLab (gitlab.com/blueflyio/ossa/openstandardagents)
# GitHub mirror: Read-only, synced by CI on release (not project mirroring)
# npm: Auto-package on merge, manual publish with OTP support
#
# Branches:
#   release/v0.4.x  - Active development
#   main            - Production releases
#
# GitLab Ultimate Features:
#   - Auto DevOps security scanning (SAST, DAST, dependency, container)
#   - Code Quality analysis
#   - GitLab Package Registry (auto-publish on merge)
#   - GitLab Observability (tracing, metrics, logs)
#   - SBOM generation (CycloneDX)
#   - Performance testing
# =============================================================================

stages:
  - validate
  - test
  - build
  - security
  - quality
  - smoke
  - package
  - release
  - deploy
  - sync

variables:
  NODE_VERSION: "22.14"
  GIT_DEPTH: 0
  # GitLab Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://87749026.otel.gitlab-o11y.com:4318"
  OTEL_SERVICE_NAME: "ossa-ci-pipeline"
  OTEL_TRACES_EXPORTER: "otlp"
  # Security scanning
  SAST_EXCLUDED_PATHS: "node_modules/,dist/,coverage/"
  SECURE_LOG_LEVEL: "info"

include:
  # GitLab Ultimate security templates
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml
  # Local configs
  - local: '.gitlab/ci/token-rotation.yml'
  - local: '.gitlab/ci/mirror-github.yml'

# =============================================================================
# BASE JOB TEMPLATE
# =============================================================================
.base-runner:
  image: node:${NODE_VERSION}
  tags:
    - saas-linux-small-amd64
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

# =============================================================================
# VALIDATE STAGE
# =============================================================================
validate:schema:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:schema
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:examples:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:examples
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# TEST STAGE
# =============================================================================
test:unit:
  extends: .base-runner
  stage: test
  script:
    - npm run test:unit
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# BUILD STAGE
# =============================================================================
build:
  extends: .base-runner
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

sbom:generate:
  extends: .base-runner
  stage: build
  needs:
    - job: build
      artifacts: true
  script:
    - npx @cyclonedx/cyclonedx-npm --output-file gl-sbom-npm.cdx.json
  artifacts:
    reports:
      cyclonedx: gl-sbom-*.cdx.json
    paths:
      - gl-sbom-*.cdx.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# =============================================================================
# SECURITY STAGE (GitLab Ultimate)
# =============================================================================
# SAST, Dependency Scanning, Secret Detection run automatically via templates

# =============================================================================
# QUALITY STAGE (GitLab Ultimate)
# =============================================================================
# Code Quality runs automatically via template

# =============================================================================
# SMOKE STAGE
# =============================================================================
test:smoke:
  extends: .base-runner
  stage: smoke
  needs:
    - job: build
      artifacts: true
  script:
    - npm run test:smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# PACKAGE STAGE - Auto-publish to GitLab Package Registry
# =============================================================================
package:gitlab:
  extends: .base-runner
  stage: package
  needs:
    - job: build
      artifacts: true
    - job: sbom:generate
      artifacts: true
  before_script:
    - npm ci --cache .npm --prefer-offline
    - |
      echo "@bluefly:registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Publishing v${VERSION} to GitLab Package Registry..."

      # Create tarball
      npm pack

      # Publish to GitLab Package Registry
      npm publish --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/

      echo "Package published to GitLab Package Registry"
      echo "Install: npm install @bluefly/openstandardagents@${VERSION}"
  artifacts:
    paths:
      - "*.tgz"
      - gl-sbom-*.cdx.json
    expire_in: 90 days
    reports:
      # GitLab Ultimate: Package metadata
      cyclonedx: gl-sbom-*.cdx.json
  rules:
    # Auto-publish on main or release branches
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
      when: on_success
  environment:
    name: package-registry
    url: https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages

# =============================================================================
# RELEASE STAGE - Manual npm Publish with OTP Support
# =============================================================================
release:npmjs:
  stage: release
  image: node:${NODE_VERSION}
  extends: .base-runner
  environment:
    name: npmjs-production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
    action: start
  needs:
    - job: package:gitlab
      artifacts: true
  before_script:
    - npm ci --cache .npm --prefer-offline
    - |
      # Configure npm registry
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      # Verify tokens
      if [ -z "$NPM_TOKEN" ]; then
        echo "ERROR: NPM_TOKEN not set in CI/CD variables"
        echo "Set it at: Settings > CI/CD > Variables"
        exit 1
      fi

      echo "NPM token configured"
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Publishing @bluefly/openstandardagents@${VERSION} to npmjs.org..."

      # Publish with optional OTP
      if [ -n "$NPM_OTP" ]; then
        echo "Using OTP code from environment variable"
        npm publish --access public --otp="${NPM_OTP}"
      else
        echo "No OTP provided (set NPM_OTP variable if 2FA is enabled)"
        npm publish --access public
      fi

      echo "Published to npmjs.org"
      echo "https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION}"
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 90 days
  rules:
    # Manual trigger only on main branch
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

# =============================================================================
# DEPLOY STAGE - GitLab Release + Observability
# =============================================================================
# GitLab release after npm publish (main branch flow)
deploy:gitlab-release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release:npmjs
      artifacts: true
  before_script:
    - apk add --no-cache nodejs npm
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Creating GitLab release for v${VERSION}..."
  release:
    tag_name: "v${VERSION}"
    name: "Release v${VERSION}"
    description: |
      ## OSSA v${VERSION}

      Released to npmjs.org and GitLab Package Registry.

      ### Install
      ```bash
      npm install @bluefly/openstandardagents@${VERSION}
      ```

      ### Links
      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION})
      - [GitLab Package](https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages)
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents)
      - [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)
    assets:
      links:
        - name: "npm package"
          url: "https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION}"
        - name: "GitLab Package"
          url: "https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

# GitLab release on tag creation (covers RC and stable tags from any branch)
deploy:gitlab-release-tag:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: []
  script:
    - echo "Creating GitLab release for tag ${CI_COMMIT_TAG}"
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "Release ${CI_COMMIT_TAG}"
    description: |
      ## OSSA ${CI_COMMIT_TAG}

      ### Install
      ```bash
      npm install @bluefly/openstandardagents@${CI_COMMIT_TAG#v}
      ```

      ### Links
      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${CI_COMMIT_TAG#v})
      - [GitLab Package](https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages)
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents/releases/tag/${CI_COMMIT_TAG})
      - [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)
  rules:
    # Stable tags: v1.2.3
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
    # RC tags: v1.2.3-rc.N
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$/
      when: on_success

# =============================================================================
# SYNC STAGE - Defined in .gitlab/ci/mirror-github.yml (included above)
# =============================================================================
# Syncs main + release/* branches + stable/RC tags to GitHub
# Auto-creates GitHub releases for every tag
# GITHUB_TOKEN must be set in CI/CD variables
# =============================================================================
