# =============================================================================
# OSSA Specification CI/CD Pipeline (GitLab Ultimate)
# =============================================================================
#
# Source of truth: GitLab (gitlab.com/blueflyio/ossa/openstandardagents)
# GitHub mirror: Read-only, synced by CI on release (not project mirroring)
# npm: Auto-package on merge, manual publish with OTP support
#
# Branches:
#   release/v0.4.x  - Active development
#   main            - Production releases
#
# GitLab Ultimate Features:
#   - Auto DevOps security scanning (SAST, DAST, dependency, container)
#   - Code Quality analysis
#   - GitLab Package Registry (auto-publish on merge)
#   - GitLab Observability (tracing, metrics, logs)
#   - SBOM generation (CycloneDX)
#   - Performance testing
# =============================================================================

stages:
  - validate
  - test
  - build
  - security
  - quality
  - smoke
  - export
  - package
  - release
  - deploy
  - sync

variables:
  NODE_VERSION: "22.14"
  GIT_DEPTH: 0
  # GitLab Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://87749026.otel.gitlab-o11y.com:4318"
  OTEL_SERVICE_NAME: "ossa-ci-pipeline"
  OTEL_TRACES_EXPORTER: "otlp"
  # Security scanning
  SAST_EXCLUDED_PATHS: "node_modules/,dist/,coverage/"
  SECURE_LOG_LEVEL: "info"

default:
  tags:
    - oracle

include:
  # GitLab Ultimate security templates
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml
  # Local configs
  - local: '.gitlab/ci/token-rotation.yml'
  - local: '.gitlab/ci/export-langflow.yml'
  - local: '.gitlab/ci/mirror-github.yml'
  - local: '.gitlab/ci/plugins.yml'

# =============================================================================
# BASE JOB TEMPLATE
# =============================================================================
.base-runner:
  image: node:${NODE_VERSION}
  tags:
    - oracle
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

# =============================================================================
# VALIDATE STAGE
# =============================================================================
validate:schema:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:schema
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:examples:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:examples
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:no-symlinks:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:no-symlinks
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:openapi:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:openapi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
  allow_failure: true


# Lint UADP OpenAPI (spectral) + AsyncAPI (asyncapi/cli) specs
# spectral already in devDeps: @stoplight/spectral-cli
# asyncapi: installed ad-hoc via npx — no custom linting code
validate:uadp-specs:
  extends: .base-runner
  stage: validate
  script:
    - 'echo "=== Spectral: UADP OpenAPI 3.1 ==="'
    - 'npx @stoplight/spectral-cli lint openapi/uadp-openapi.yaml --ruleset spectral:oas'
    - 'echo "=== AsyncAPI CLI: UADP AsyncAPI 3.0 ==="'
    - 'npx -y @asyncapi/cli validate openapi/uadp-asyncapi.yaml'
    - 'echo "=== All UADP specs valid ==="'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/


# Validate all OSSA manifests in spec/reference and .agents/ using ossa validate
validate:manifests-ossa:
  extends: .base-runner
  stage: validate
  script:
    - npm run build
    - npx ossa validate spec/reference/reference-agents/*/manifest.ossa.yaml
    - |
      for f in $(find .agents -name "*.ossa.yaml" 2>/dev/null); do
        echo "Validating $f"
        npx ossa validate "$f"
      done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# Discover agents and list them (workspace init → discover → list)
validate:agents-discover:
  extends: .base-runner
  stage: validate
  script:
    - npm run build
    - npx ossa workspace init --name openstandardagents 2>/dev/null || true
    - npx ossa workspace discover
    - npx ossa agents list
  artifacts:
    paths:
      - .agents-workspace/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# Test MCP server starts and responds to tools/list
validate:mcp-server:
  extends: .base-runner
  stage: validate
  script:
    - npm run build
    - |
      echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
        | node dist/mcp-server/index.js 2>/dev/null \
        | head -1 \
        | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));if(!d.result)process.exit(1);console.log('MCP server OK:',d.result.serverInfo)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# TEST STAGE
# =============================================================================
test:unit:
  extends: .base-runner
  stage: test
  script:
    - npm run test:unit
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# BUILD STAGE
# =============================================================================
build:
  extends: .base-runner
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

sbom:generate:
  extends: .base-runner
  stage: build
  needs:
    - job: build
      artifacts: true
  script:
    - npx @appthreat/cdxgen -o gl-sbom-npm.cdx.json
  artifacts:
    reports:
      cyclonedx: gl-sbom-*.cdx.json
    paths:
      - gl-sbom-*.cdx.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# =============================================================================
# SECURITY STAGE (GitLab Ultimate)
# =============================================================================
# SAST, Dependency Scanning, Secret Detection run automatically via templates

# =============================================================================
# QUALITY STAGE (GitLab Ultimate)
# =============================================================================
# Code Quality runs automatically via template

# =============================================================================
# SMOKE STAGE
# =============================================================================
test:smoke:
  extends: .base-runner
  stage: smoke
  needs:
    - job: build
      artifacts: true
  script:
    - npm run test:smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# PACKAGE STAGE - Prerelease publishing pipeline
# =============================================================================
# Flow:
#   release/* push  → <version>-dev.N  → GitLab Package Registry (auto)
#   main push       → <version>-rc.N   → GitLab Package Registry (auto)
#   manual trigger  → <version>        → npmjs.org (button in UI)
# =============================================================================

# Shared setup for all package jobs
.package-base:
  extends: .base-runner
  stage: package
  needs:
    - job: build
      artifacts: true
    - job: test:unit
    - job: test:smoke
  before_script:
    - npm ci --cache .npm --prefer-offline
    - |
      echo "@bluefly:registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc

# --- DEV: release/* → <version>-dev.N to GitLab ---
package:dev:
  extends: .package-base
  script:
    - |
      BASE_VERSION=$(node -p "require('./package.json').version")
      # Count existing dev packages to auto-increment
      DEV_COUNT=$(npm view "@bluefly/openstandardagents" versions --json --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/ 2>/dev/null \
        | node -e "try{const v=JSON.parse(require('fs').readFileSync(0,'utf8'));const d=Array.isArray(v)?v:[];console.log(d.filter(x=>x.startsWith('${BASE_VERSION}-dev.')).length)}catch{console.log(0)}" || echo 0)
      DEV_VERSION="${BASE_VERSION}-dev.$((DEV_COUNT + 1))"

      echo "Publishing ${DEV_VERSION} to GitLab Package Registry..."
      npm version "${DEV_VERSION}" --no-git-tag-version
      npm publish --tag dev --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      echo "Published: npm install @bluefly/openstandardagents@${DEV_VERSION}"
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^release\//
      when: on_success
  environment:
    name: dev-registry
    url: https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages

# --- RC: main → <version>-rc.N to GitLab ---
package:rc:
  extends: .package-base
  script:
    - |
      BASE_VERSION=$(node -p "require('./package.json').version")
      # Count existing RC packages to auto-increment
      RC_COUNT=$(npm view "@bluefly/openstandardagents" versions --json --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/ 2>/dev/null \
        | node -e "try{const v=JSON.parse(require('fs').readFileSync(0,'utf8'));const d=Array.isArray(v)?v:[];console.log(d.filter(x=>x.startsWith('${BASE_VERSION}-rc.')).length)}catch{console.log(0)}" || echo 0)
      RC_VERSION="${BASE_VERSION}-rc.$((RC_COUNT + 1))"

      echo "Publishing ${RC_VERSION} to GitLab Package Registry..."
      npm version "${RC_VERSION}" --no-git-tag-version
      npm publish --tag rc --registry=https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      echo "Published: npm install @bluefly/openstandardagents@${RC_VERSION}"

      # Tag the commit for GitLab release creation
      git config user.email "ci@blueflyio"
      git config user.name "OSSA Release Bot"
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git tag "v${RC_VERSION}" || true
      git push origin "v${RC_VERSION}" || true
  artifacts:
    paths:
      - "*.tgz"
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  environment:
    name: rc-registry
    url: https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages

# --- STABLE: Manual publish to npmjs.org ---
# Trigger: Run pipeline with PUBLISH_NPMJS=true, or click "Play" button in UI
# Requires CI/CD variable: NPM_TOKEN (npmjs.org auth token)
release:npmjs:
  stage: release
  image: node:${NODE_VERSION}
  tags:
    - oracle
  needs:
    - job: build
      artifacts: true
    - job: test:unit
    - job: test:smoke
  before_script:
    - npm ci --cache .npm --prefer-offline
    - |
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Publishing v${VERSION} to npmjs.org..."
      npm publish --registry=https://registry.npmjs.org/ --access public
      echo "Published: https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION}"
  environment:
    name: npmjs-production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
  rules:
    # Manual trigger on main branch only
    - if: $CI_COMMIT_BRANCH == "main" && $PUBLISH_NPMJS == "true"
      when: manual
    # Also allow manual trigger on release branches for hotfix publishes
    - if: $CI_COMMIT_BRANCH =~ /^release\// && $PUBLISH_NPMJS == "true"
      when: manual


# GitLab release on tag creation (covers RC and stable tags from any branch)
deploy:gitlab-release-tag:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: []
  script:
    - echo "Creating GitLab release for tag ${CI_COMMIT_TAG}"
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "Release ${CI_COMMIT_TAG}"
    description: |
      ## OSSA ${CI_COMMIT_TAG}

      ### Install
      ```bash
      npm install @bluefly/openstandardagents@${CI_COMMIT_TAG#v}
      ```

      ### Links
      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${CI_COMMIT_TAG#v})
      - [GitLab Package](https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages)
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents/releases/tag/${CI_COMMIT_TAG})
      - [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)
  rules:
    # Stable tags: v1.2.3
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
    # RC tags: v1.2.3-rc.N
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$/
      when: on_success

# =============================================================================
# DISCOVERY PUBLISH - Push workspace discovery to mesh/registry when MESH_URL set
# =============================================================================
# Runs on main/release. Discovers .agents/ then POSTs to MESH_URL/api/v1/discovery.
# Set MESH_URL (or AGENT_REGISTRY_URL) in CI/CD variables to enable publish.
# =============================================================================
discovery:publish:
  extends: .base-runner
  stage: deploy
  script:
    - |
      if [ ! -f ".agents-workspace/registry/index.yaml" ]; then
        echo "Initializing workspace for discovery..."
        npx ossa workspace init --name openstandardagents
      fi
    - npx ossa workspace discover
    - |
      if [ -n "${MESH_URL}" ] || [ -n "${AGENT_REGISTRY_URL}" ]; then
        REGISTRY_URL="${MESH_URL:-$AGENT_REGISTRY_URL}"
        echo "Publishing discovery to registry: $REGISTRY_URL"
        npx ossa workspace publish --registry-url "$REGISTRY_URL"
      else
        echo "MESH_URL/AGENT_REGISTRY_URL not set; skipping publish"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
      when: on_success

# =============================================================================
# WIKI STAGE - Publish docs/wiki/* to GitLab Wiki (GitLab API only; no BuildKit)
# =============================================================================
# Runs when docs/wiki/ or .gitlab/wiki-publish-manifest.json change.
# Requires: GITLAB_TOKEN or GITLAB_PUSH_TOKEN (wiki API).
# =============================================================================
wiki:publish:
  stage: deploy
  image: node:${NODE_VERSION}
  tags:
    - oracle
  script:
    - node .gitlab/wiki-publish.cjs
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
      changes:
        - docs/wiki/**/*
        - .gitlab/wiki-publish-manifest.json

# =============================================================================
# SYNC STAGE - Defined in .gitlab/ci/mirror-github.yml (included above)
# =============================================================================
# Syncs main + release/* branches + stable/RC tags to GitHub
# Auto-creates GitHub releases for every tag
# GITHUB_TOKEN must be set in CI/CD variables
# =============================================================================

# ci-trigger
