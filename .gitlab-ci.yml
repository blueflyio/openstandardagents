# =============================================================================
# OSSA Specification CI/CD Pipeline
# =============================================================================
#
# Source of truth: GitLab (gitlab.com/blueflyio/ossa/openstandardagents)
# GitHub mirror: Read-only, synced by CI on release (not project mirroring)
# npm: Published manually or via CI (requires OTP for 2FA)
#
# Branches:
#   release/v0.4.x  - Active development
#   main            - Production releases
# =============================================================================

stages:
  - validate
  - test
  - build
  - smoke
  - release
  - deploy
  - sync

variables:
  NODE_VERSION: "22.14"
  GIT_DEPTH: 0

include:
  - local: '.gitlab/ci/token-rotation.yml'
  - local: '.gitlab/ci/mirror-github.yml'

# =============================================================================
# BASE JOB TEMPLATE
# =============================================================================
.base-runner:
  image: node:${NODE_VERSION}
  tags:
    - saas-linux-small-amd64
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

# =============================================================================
# VALIDATE STAGE
# =============================================================================
validate:schema:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:schema
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:examples:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:examples
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# TEST STAGE
# =============================================================================
test:unit:
  extends: .base-runner
  stage: test
  script:
    - npm run test:unit
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# BUILD STAGE
# =============================================================================
build:
  extends: .base-runner
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

sbom:generate:
  extends: .base-runner
  stage: build
  needs:
    - job: build
      artifacts: true
  script:
    - npx @cyclonedx/cyclonedx-npm --output-file gl-sbom-npm.cdx.json
  artifacts:
    reports:
      cyclonedx: gl-sbom-*.cdx.json
    paths:
      - gl-sbom-*.cdx.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# =============================================================================
# SMOKE STAGE
# =============================================================================
test:smoke:
  extends: .base-runner
  stage: smoke
  needs:
    - job: build
      artifacts: true
  script:
    - npm run test:smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# RELEASE STAGE - Production Release (Manual)
# =============================================================================
release:production:
  stage: release
  image: node:${NODE_VERSION}
  extends: .base-runner
  environment:
    name: production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
    action: start
  variables:
    GIT_AUTHOR_NAME: "OSSA Release Bot"
    GIT_AUTHOR_EMAIL: "release-bot@openstandardagents.org"
    GIT_COMMITTER_NAME: "OSSA Release Bot"
    GIT_COMMITTER_EMAIL: "release-bot@openstandardagents.org"
  before_script:
    - npm ci
    - npm run build
    - git config user.name "${GIT_AUTHOR_NAME}"
    - git config user.email "${GIT_AUTHOR_EMAIL}"
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "ERROR: NPM_TOKEN not set in CI/CD variables"
        exit 1
      fi
      if [ -z "$GITLAB_PUSH_TOKEN" ]; then
        echo "ERROR: GITLAB_PUSH_TOKEN not set"
        exit 1
      fi
      echo "Required tokens configured"
  script:
    - echo "Running semantic-release for production..."
    - npx semantic-release
    - |
      NEW_VERSION=$(node -p "require('./package.json').version")
      echo "Released production version: v${NEW_VERSION}"
  when: manual
  only:
    - main
  artifacts:
    paths:
      - dist/*.tgz
    expire_in: 90 days

# =============================================================================
# DEPLOY STAGE - npm Publish + GitLab Release
# =============================================================================
deploy:npm:
  stage: deploy
  image: node:${NODE_VERSION}
  extends: .base-runner
  environment:
    name: production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
    action: start
  needs:
    - job: release:production
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Publishing to npm: v${VERSION}"
      npm publish --access public
      echo "Published: @bluefly/openstandardagents@${VERSION}"
  only:
    - main


# =============================================================================
# DEPLOY STAGE - GitLab Release
# =============================================================================
deploy:gitlab-release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release:production
      artifacts: true
    - job: deploy:npm
  before_script:
    - apk add --no-cache nodejs npm
  script:
    - VERSION=$(node -p "require('./package.json').version")
    - echo "Creating GitLab release for v${VERSION}..."
  release:
    tag_name: "v${VERSION}"
    name: "Release v${VERSION}"
    description: |
      ## OSSA v${VERSION}

      See [CHANGELOG.md](CHANGELOG.md) for release notes.

      ### Install
      ```bash
      npm install @bluefly/openstandardagents@${VERSION}
      ```

      ### Links
      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION})
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents)
      - [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)
    assets:
      links:
        - name: "npm package"
          url: "https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION}"
  only:
    - main

# GitLab release on tag creation (covers RC and stable tags from any branch)
deploy:gitlab-release-tag:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: []
  script:
    - echo "Creating GitLab release for tag ${CI_COMMIT_TAG}"
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "Release ${CI_COMMIT_TAG}"
    description: |
      ## OSSA ${CI_COMMIT_TAG}

      ### Install
      ```bash
      npm install @bluefly/openstandardagents@${CI_COMMIT_TAG#v}
      ```

      ### Links
      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${CI_COMMIT_TAG#v})
      - [GitLab Package](https://gitlab.com/blueflyio/ossa/openstandardagents/-/packages)
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents/releases/tag/${CI_COMMIT_TAG})
      - [Changelog](https://gitlab.com/blueflyio/ossa/openstandardagents/-/blob/main/CHANGELOG.md)
  rules:
    # Stable tags: v1.2.3
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
    # RC tags: v1.2.3-rc.N
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$/
      when: on_success

# =============================================================================
# SYNC STAGE - Defined in .gitlab/ci/mirror-github.yml (included above)
# =============================================================================
# Syncs main + release/* branches + stable/RC tags to GitHub
# Auto-creates GitHub releases for every tag
# GITHUB_TOKEN must be set in CI/CD variables
# =============================================================================
