# =============================================================================
# OSSA Specification CI/CD Pipeline
# =============================================================================
#
# Source of truth: GitLab (gitlab.com/blueflyio/ossa/openstandardagents)
# GitHub mirror: Read-only, synced by CI on release (not project mirroring)
# npm: Published manually or via CI (requires OTP for 2FA)
#
# Branches:
#   release/v0.4.x  - Active development
#   main            - Production releases
# =============================================================================

stages:
  - validate
  - test
  - build
  - smoke
  - release
  - deploy
  - sync

variables:
  NODE_VERSION: "22.14"
  GIT_DEPTH: 0

include:
  - local: '.gitlab/ci/token-rotation.yml'

# =============================================================================
# BASE JOB TEMPLATE
# =============================================================================
.base-runner:
  image: node:${NODE_VERSION}
  tags:
    - saas-linux-small-amd64
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

# =============================================================================
# VALIDATE STAGE
# =============================================================================
validate:schema:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:schema
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

validate:examples:
  extends: .base-runner
  stage: validate
  script:
    - npm run validate:examples
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# TEST STAGE
# =============================================================================
test:unit:
  extends: .base-runner
  stage: test
  script:
    - npm run test:unit
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# BUILD STAGE
# =============================================================================
build:
  extends: .base-runner
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# SMOKE STAGE
# =============================================================================
test:smoke:
  extends: .base-runner
  stage: smoke
  needs:
    - job: build
      artifacts: true
  script:
    - npm run test:smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|release\/)/

# =============================================================================
# RELEASE STAGE - Production Release (Manual)
# =============================================================================
release:production:
  stage: release
  image: node:${NODE_VERSION}
  extends: .base-runner
  environment:
    name: production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
    action: start
  variables:
    GIT_AUTHOR_NAME: "OSSA Release Bot"
    GIT_AUTHOR_EMAIL: "release-bot@openstandardagents.org"
    GIT_COMMITTER_NAME: "OSSA Release Bot"
    GIT_COMMITTER_EMAIL: "release-bot@openstandardagents.org"
  before_script:
    - npm ci
    - npm run build
    - git config user.name "${GIT_AUTHOR_NAME}"
    - git config user.email "${GIT_AUTHOR_EMAIL}"
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "ERROR: NPM_TOKEN not set in CI/CD variables"
        exit 1
      fi
      if [ -z "$GITLAB_PUSH_TOKEN" ]; then
        echo "ERROR: GITLAB_PUSH_TOKEN not set"
        exit 1
      fi
      echo "Required tokens configured"
  script:
    - echo "Running semantic-release for production..."
    - npx semantic-release
    - |
      NEW_VERSION=$(node -p "require('./package.json').version")
      echo "Released production version: v${NEW_VERSION}"
  when: manual
  only:
    - main
  artifacts:
    paths:
      - dist/*.tgz
    expire_in: 90 days

# =============================================================================
# DEPLOY STAGE - npm Publish + GitLab Release
# =============================================================================
deploy:npm:
  stage: deploy
  image: node:${NODE_VERSION}
  extends: .base-runner
  environment:
    name: production
    deployment_tier: production
    url: https://www.npmjs.com/package/@bluefly/openstandardagents
    action: start
  needs:
    - job: release:production
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Publishing to npm: v${VERSION}"
      npm publish --access public
      echo "Published: @bluefly/openstandardagents@${VERSION}"
  only:
    - main

deploy:gitlab-release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release:production
      artifacts: true
    - job: deploy:npm
  before_script:
    - apk add --no-cache nodejs npm
  script:
    - VERSION=$(node -p "require('./package.json').version")
    - echo "Creating GitLab release for v${VERSION}..."
  release:
    tag_name: "v${VERSION}"
    name: "Release v${VERSION}"
    description: |
      ## OSSA v${VERSION}

      See [CHANGELOG.md](CHANGELOG.md) for release notes.

      ```bash
      npm install @bluefly/openstandardagents@${VERSION}
      ```

      - [npm](https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION})
      - [GitHub mirror](https://github.com/blueflyio/openstandardagents)
    assets:
      links:
        - name: "npm package"
          url: "https://www.npmjs.com/package/@bluefly/openstandardagents/v/${VERSION}"
  only:
    - main

# =============================================================================
# SYNC STAGE - Mirror to GitHub (read-only)
# =============================================================================
# Replaces GitLab project mirroring setting.
# GITHUB_TOKEN must be set in CI/CD variables (fine-grained PAT with Contents write).
# Syncs main + release branch + tags. Runs after deploy or on schedule.
# =============================================================================
sync:github:
  stage: sync
  image: alpine/git:latest
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - git config user.name "OSSA Release Bot"
    - git config user.email "release-bot@openstandardagents.org"
  script:
    - |
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "GITHUB_TOKEN not set - skipping GitHub sync"
        exit 0
      fi

      GITHUB_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/blueflyio/openstandardagents.git"

      echo "Syncing main to GitHub..."
      git push "$GITHUB_URL" origin/main:main --force 2>&1 || echo "WARN: main sync failed (non-fatal)"

      echo "Syncing release/v0.4.x to GitHub..."
      git push "$GITHUB_URL" origin/release/v0.4.x:release/v0.4.x --force 2>&1 || echo "WARN: release sync failed (non-fatal)"

      echo "Syncing tags to GitHub..."
      git push "$GITHUB_URL" --tags --force 2>&1 || echo "WARN: tag sync failed (non-fatal)"

      echo "GitHub sync complete"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
  allow_failure: true
